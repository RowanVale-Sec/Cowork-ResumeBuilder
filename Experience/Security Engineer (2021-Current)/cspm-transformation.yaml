proudest_achievement:
  headline: >
    Architected an enterprise CSPM operating model that replaced a reactive,
    siloed posture with a proactive, risk-driven, shared-responsibility framework —
    and won visible, collective executive sponsorship across security, risk, and
    engineering leadership.
  story: >
    In a ~4-month architecture engagement, I turned CSPM from a tool conversation
    into an operating-model conversation. By leading with shared responsibility,
    SDLC integration, and risk-framework-mapped control baselines — rather than
    tool selection — I aligned historically siloed teams under a single framework,
    secured CISO-level and engineering-leadership sponsorship, and produced a
    design that is execution-ready and extensible to CNAPP.
  why_it_matters: >
    Demonstrates the ability to architect enterprise-scale cloud security programs,
    navigate multi-stakeholder leadership environments, translate security design
    into engineering reality, and create durable governance foundations rather
    than point fixes.
