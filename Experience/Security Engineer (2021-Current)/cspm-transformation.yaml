meta:
  project_name: "CSPM Transformation & Shared-Responsibility Operating Model"
  organization: "Fortune 500 Enterprise (anonymized)"
  role: "Cloud Security Architect"
  engagement_type: "architecture_advisory"
  duration:
    start: "2025-10"
    end: "2026-01"
    length_description: "~4 months"
  team:
    size: "Cross-functional working group spanning Security Architecture, DevSecOps, Platform Engineering, Enterprise Risk / GRC, and Application Security"
    your_role_in_team: "Lead Architect — single technical owner of the target-state operating model"
    direct_reports: 0

context:
  business_problem: >
    CSPM across the enterprise was reactive and fragmented. Misconfigurations were
    surfaced post-deployment, driving extended risk windows, duplicated alerts across
    scanners, growing engineering tech debt, and limited visibility into overall
    cloud security posture. Security, risk, DevSecOps, and application teams
    operated in silos with no shared accountability model and no consistent way to
    measure control effectiveness, residual risk, or remediation performance.
  why_it_mattered: >
    Without a unified operating model, the organization would continue to absorb a
    growing backlog of misconfigurations, inconsistent control coverage against
    enterprise risk frameworks, and a fragmented response posture — undermining any
    follow-on CNAPP or cloud-native security investment.
  scope: "Enterprise-wide, across build, deploy, and runtime stages of the cloud lifecycle"
  audience: "CISO / Deputy CISO, Head of Security Architecture, VP / Head of DevSecOps & Platform Engineering, Head of Enterprise Risk / GRC, application engineering leadership"
  industry_domain: "Enterprise Cloud Security, CSPM, CNAPP, DevSecOps"

approach:
  nature_of_work: "redesign / transformation architecture"
  methodology: >
    Operating-model-led rather than tool-led. Designed target-state workflows,
    ownership, and measurement first; mapped tooling to the model afterward.
    Iterated design through executive socialization with CISO, Security Architecture,
    DevSecOps, and Enterprise Risk leadership.
  frameworks_referenced:
    - "NIST Cybersecurity Framework (CSF)"
    - "NIST SP 800-53"
    - "CIS Benchmarks / CIS Controls"
  design_patterns:
    - name: "SDLC-Integrated CSPM Workflow"
      description: "PR-time misconfiguration detection, post-merge routing into sprint planning, consolidated runtime monitoring"
      risks_addressed: ["Post-deployment misconfigurations", "Alert duplication", "Remediation latency"]
      deployment_scenarios: ["Multi-cloud", "Containerized workloads", "IaC-managed infrastructure"]
    - name: "Shared-Responsibility RACI Model"
      description: "Clear ownership delineation across Security Architecture, Risk/GRC, DevSecOps, Platform Eng, and Application teams"
      risks_addressed: ["Ownership gaps between detect and fix", "Cross-team friction", "Unclear accountability"]
      deployment_scenarios: ["Enterprise-scale operating model", "Multi-BU cloud estates"]
    - name: "Risk-Framework-Mapped Control Baseline"
      description: "Central control catalog mapped to NIST CSF, NIST 800-53, and CIS Benchmarks for automated effectiveness & residual-risk measurement"
      risks_addressed: ["Unmeasurable control effectiveness", "No residual-risk signal", "Governance gaps"]
      deployment_scenarios: ["Risk-tiered workloads", "Regulated business units"]
  key_decisions:
    - "Reject tool-led design; anchor the program on operating model and ownership first"
    - "Shift misconfiguration detection left into PR reviews rather than post-deploy scans"
    - "Route remediation into engineering sprint planning with SLA-aligned priorities"
    - "Map control baselines to enterprise risk frameworks to convert posture into a risk signal"
    - "Use RACI to dissolve the historical gray zone between 'who detects' and 'who fixes'"
  innovations:
    - "Shared-responsibility operating framework as the anchor artifact (vs. a tool deployment)"
    - "Sprint-integrated remediation pattern as default engineering workflow"
    - "Automated control-effectiveness and residual-risk measurement tied to NIST/CIS"
    - "Single operating framework aligning historically siloed security, risk, and engineering teams"

