context:
  business_problem: >
    Enterprise security tooling is fragmented: SAST, SCA, IaC, container, and
    secrets scanners generate overlapping noisy findings, and threat modeling
    remains a mostly manual, point-in-time workshop artifact decoupled from
    actual code and runtime posture. There is no widely-available open-source
    pipeline that automates end-to-end, architecture-aware threat modeling.
  why_it_mattered: >
    Without architecture-aware automation, findings pile up without prioritization,
    threat models go stale the moment they are written, and practitioners cannot
    iterate on threat modeling as a software discipline. COMPASS shows a path
    to treat threat modeling as code.
  scope: "End-to-end: codebase ingestion → multi-tool scanning → deduplication → MITRE mapping → SBOM + architecture + data-flow → STRIDE + attack-chain + CVSS"
  audience: "Application-security engineers, DevSecOps practitioners, AI-engineering / MCP community"
  industry_domain: "Application Security, Threat Modeling, DevSecOps, Applied AI / Agentic Systems"

approach:
  nature_of_work: "greenfield open-source system design & implementation"
  methodology: >
    Designed as a deliberately balanced intersection of three disciplines:
    applied multi-agent AI engineering, security architecture & threat modeling,
    and DevSecOps platform engineering. Structured around three principles:
    agents as first-class HTTP services; S3 as a durable inter-agent message bus;
    MCP servers as shared knowledge and tool planes.
  frameworks_referenced:
    - "STRIDE"
    - "MITRE ATT&CK"
    - "CVSS (risk scoring pattern)"
    - "Model Context Protocol (MCP)"
    - "Microsoft Agent SDK (earlier design iteration)"
  design_patterns:
    - name: "Orchestrator + Specialist Agents"
      description: "Orchestrator service sequences Scanner → Inventory → Threat Model; each agent has an HTTP /run endpoint and is independently runnable"
      risks_addressed: ["Monolithic security pipelines", "Non-reproducible threat modeling", "Tight coupling between tools"]
      deployment_scenarios: ["CI/CD pipelines", "Security research", "Automated threat modeling for any codebase"]
    - name: "S3 as Inter-Agent Message Bus"
      description: "Versioned JSON artifacts between agents (mitre-mapped-findings, inventory, threat-model, executive-reports) — durable, replayable, human-readable"
      risks_addressed: ["Ephemeral pipeline state", "Non-reproducible outputs", "Debug opacity"]
      deployment_scenarios: ["Multi-agent pipelines", "Audit-grade security automation"]
    - name: "MCP-for-Security Tool Plane"
      description: "FastMCP / Streamable HTTP servers expose MITRE ATT&CK and Syft (SBOM) as shared tool/knowledge planes across agents"
      risks_addressed: ["Per-agent tool duplication", "Knowledge fragmentation"]
      deployment_scenarios: ["Agentic security stacks", "Multi-agent knowledge sharing"]
    - name: "LLM-Embedding Finding Deduplication"
      description: "Azure OpenAI embeddings + cosine-similarity clustering collapse near-duplicate findings across tools that rule-based dedup cannot catch"
      risks_addressed: ["Alert fatigue", "Cross-tool noise"]
      deployment_scenarios: ["Any multi-scanner pipeline"]
    - name: "Architecture-Aware Threat Modeling Pipeline"
      description: "Four-stage reasoning: correlate → generate attack scenarios → STRIDE → CVSS-style score & prioritize"
      risks_addressed: ["Finding-by-finding severity triage", "Architecture-disconnected threat models"]
      deployment_scenarios: ["Continuous threat modeling", "Architecture review automation"]
  key_decisions:
    - "Evolve away from tightly-coupled Agent-SDK design toward loose-coupled HTTP + MCP + S3 to maximize observability, reproducibility, and independent debuggability"
    - "Treat deduplication as an LLM-native problem (embeddings + cosine) rather than a rule-based problem"
    - "Model MITRE ATT&CK and Syft as MCP servers rather than in-agent libraries, to prove the pattern and enable reuse"
    - "Docker Compose with health-gated startup so downstream agents never receive partial state"
    - "Publish the earlier design doc alongside the realized implementation to make architectural reasoning transparent"
  innovations:
    - "Architecture-aware, automated, multi-agent threat modeling as an open-source artifact"
    - "Practical MCP-for-security pattern (ATT&CK + Syft as shared MCP planes)"
    - "LLM-embedding deduplication across seven heterogeneous scanner outputs"
    - "S3-as-message-bus pattern for agentic security pipelines"
    - "Published architectural evolution (SDK-coupled → HTTP+MCP+S3) as a reusable design lesson"

deliverables:
  primary:
    - name: "Orchestrator service (port 8093)"
      description: "HTTP entry point; sequences Scanner → Inventory → Threat Model and produces executive summary artifact"
      consumers: ["End users via POST /run", "CI/CD pipelines"]
      shelf_life: "Living project core"
    - name: "Scanner agent (port 8090)"
      description: "Parallel execution of Checkov, Trivy (IaC/SCA/Secrets/Image), Bandit, Semgrep + aggregation + LLM-embedding dedup + MITRE mapping"
      consumers: ["Orchestrator", "Threat Model agent (via S3)"]
      shelf_life: "Living"
    - name: "Inventory agent (port 8091)"
      description: "Enhanced SBOM via Syft MCP, architecture analysis, data-flow mapping, asset inventory w/ risk classification"
      consumers: ["Orchestrator", "Threat Model agent (via S3)"]
      shelf_life: "Living"
    - name: "Threat Model agent (port 8092)"
      description: "Four-stage pipeline: correlate → generate attack scenarios → STRIDE → CVSS-style scoring"
      consumers: ["Orchestrator", "End users via executive summary"]
      shelf_life: "Living"
    - name: "MITRE ATT&CK MCP server (port 8000)"
      description: "FastMCP / Streamable HTTP server exposing ATT&CK knowledge base as a shared tool plane"
      consumers: ["Scanner agent", "potential reuse by external agents"]
      shelf_life: "Reusable MCP artifact"
    - name: "Syft MCP server (port 8080)"
      description: "MCP wrapper around Syft for SBOM generation"
      consumers: ["Inventory agent", "potential reuse"]
      shelf_life: "Reusable MCP artifact"
  secondary:
    - "ARCHITECTURE.md — reference-quality documentation with diagrams for every service, pipeline flow, and message-bus pattern"
    - "threat-modeling-agent-framework.md — earlier design iteration (Agent SDK + MongoDB/Neo4j) published for transparency on architectural evolution"
    - "Docker Compose topology with health-gated startup"
    - "S3 artifact taxonomy: scan-results, mitre-mapped-findings, inventory, threat-model, executive-reports"

