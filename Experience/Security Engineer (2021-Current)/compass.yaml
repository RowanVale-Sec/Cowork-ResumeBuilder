proudest_achievement:
  headline: >
    Designed and built — solo — a production-quality, multi-agent security
    pipeline that automates end-to-end threat modeling by composing LLM-powered
    agents, MCP-hosted knowledge bases, and seven industry-standard scanners
    into one reproducible system.
  story: >
    In one project I demonstrated the ability to reason across three disciplines
    that rarely intersect in one engineer: the applied-AI work of orchestrating
    cooperating LLM agents over MCP and embedding-based deduplication; the
    security-architecture work of translating scan findings into STRIDE + MITRE
    + attack-chain analysis; and the DevSecOps / platform work of shipping it
    as a containerized, health-gated, S3-backed pipeline with public documentation.
  why_it_matters: >
    Demonstrates capacity to independently own a complex, multi-discipline
    engineering problem end-to-end — from architectural iteration (SDK-coupled
    → HTTP+MCP+S3), through implementation across seven scanners and four
    services, to public documentation. Direct evidence of senior-level technical
    judgment, breadth, and follow-through in currently-hot areas: agentic AI
    for security, MCP tooling, and automated threat modeling.
