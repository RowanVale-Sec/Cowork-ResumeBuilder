    direct_reports: 0

context:
  business_problem: "Enterprise client lacked a structured approach to identify, assess, and mitigate security risks across their rapidly expanding AI stack — including LLM APIs, self-hosted models, RAG pipelines, AI agents, and MCP integrations. No existing framework addressed the full breadth of AI deployment patterns or mapped risks to actionable security requirements."
  why_it_mattered: "Without a unified security framework, the organization was deploying AI systems with ad-hoc security controls, creating inconsistent risk posture, potential data leakage, and vulnerability to adversarial attacks across production AI systems."
  scope: "Enterprise-wide — framework consumed by Security, AI/ML Engineering, DevOps, Risk & Compliance, Product, and CISO office"
  audience: "Single large enterprise client"
  industry_domain: "Enterprise AI Security"

approach:
  nature_of_work: "greenfield"
  methodology: "Research-driven framework development: mapped AI deployment patterns → identified applicable risks per pattern → defined deployment scenarios → derived security requirements per scenario → grouped into capability domains → assigned ownership → operationalized with measurement and continuous improvement"
  frameworks_referenced:
    - "OWASP Top 10 for LLMs"
    - "OWASP Agentic AI Security"
    - "MITRE ATLAS"
  design_patterns:
    - name: "Custom LLM (LLM + RAG)"
      description: "Enterprise applications connecting LLMs with proprietary data via Retrieval-Augmented Generation pipelines"
      risks_addressed:
        - "OWASP LLM risks (prompt injection, data leakage, insecure output handling)"
      deployment_scenarios:
        - "Cloud-hosted RAG with managed LLM API"
        - "Self-hosted model with internal knowledge base"
    - name: "Traditional / General Purpose (Enterprise Copilot)"
      description: "General-purpose AI assistants integrated into enterprise workflows (e.g., coding copilots, productivity assistants)"
      risks_addressed:
        - "OWASP LLM risks"
        - "Data exfiltration through copilot context"
      deployment_scenarios:
        - "SaaS copilot with enterprise data access"
        - "Self-hosted copilot with controlled data boundaries"
    - name: "Single Agent"
      description: "Autonomous AI agents with tool access executing tasks on behalf of users"
      risks_addressed:
        - "OWASP LLM risks"
        - "OWASP Agentic AI risks"
        - "Tool access control and privilege escalation"
        - "MCP security"
      deployment_scenarios:
        - "Agent with read-only tool access"
        - "Agent with read-write tool access and approval workflows"
    - name: "Multi-Agent"
      description: "Orchestrated systems of multiple AI agents collaborating, delegating, and communicating"
      risks_addressed:
        - "OWASP LLM risks"
        - "OWASP Agentic AI risks"
        - "Inter-agent trust and communication security"
        - "Cascading failure and privilege propagation"
      deployment_scenarios:
        - "Supervisor-worker agent topology"
        - "Peer-to-peer agent collaboration"
        - "Agent-to-agent delegation chains"

  key_decisions:
    - "Treated agent frameworks as 'Operating Systems for LLMs' — applying OS-level security principles (access control, input/output validation, memory management, tool governance) to agent runtime environments"
    - "Classified vendor security capabilities as 'direct' vs 'indirect' — direct capabilities address threats natively (e.g., scanning LLM input/output for prompt injection), while indirect capabilities require separate supply chain and posture management (e.g., vendor-hosted MCP servers require independent supply chain verification)"
    - "Created sub-requirements based on implementation method — recognizing that the same security requirement has different control needs depending on whether it's addressed directly by a vendor tool or requires indirect organizational processes"
    - "Grouped all security requirements into four capability domains: IAM (Identity & Access Management), Data Security, TDR (Threat Detection & Response), and SPM (Security Posture Management)"
    - "For agentic patterns, added a fifth domain: Agent Framework Security — covering tool governance, LLM-to-tool I/O validation, memory management, and tool posture assessment"

  innovations:
    - "Novel 'AI Security Operating Model' treating agent frameworks as OS-level constructs requiring kernel-level security controls"
    - "Direct vs Indirect vendor capability classification enabling precise procurement criteria"
    - "Design-pattern-first risk assessment approach — risks are contextualized to how AI is actually deployed, not assessed generically"

deliverables:
  primary:
    - name: "AI Security Framework & Technical Security Requirements"
      description: "Comprehensive framework mapping 4 AI deployment patterns to applicable risks, deployment scenarios, and grouped security requirements (IAM, Data Security, TDR, SPM, Agent Framework Security). Living document designed for 1-year implementation roadmap."
      consumers:
        - "Security Engineering teams (implementation)"
        - "AI/ML Engineering teams (integration)"
        - "Risk & Compliance (audit and assessment)"
        - "CISO (investment decisions and risk dashboard)"
      shelf_life: "living document — designed for continuous improvement over 1+ year implementation"
  secondary:
    - name: "Vendor Capability Assessment Criteria"
      description: "Evaluation framework for AI security vendors based on direct vs indirect capability classification"
      consumers: ["Procurement", "Security Architecture"]
      shelf_life: "quarterly refresh"
    - name: "Internal Whitepapers & RFCs"
      description: "Technical documents detailing design rationale, threat models per deployment pattern, and agent-as-OS security model"
      consumers: ["Security Engineering", "AI/ML Engineering"]
      shelf_life: "reference material"

